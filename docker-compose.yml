services:
  parserdoc:
    build:
      context: .
      dockerfile: Dockerfile
    image: parserdoc:latest
    container_name: parserdoc
    restart: unless-stopped
    environment:
      PARSERDOC_HOST: "0.0.0.0"
      PARSERDOC_PORT: "8000"
      PARSERDOC_MAX_UPLOAD_BYTES: "${PARSERDOC_MAX_UPLOAD_BYTES:-20971520}"
      PARSERDOC_REQUEST_TIMEOUT_SECONDS: "${PARSERDOC_REQUEST_TIMEOUT_SECONDS:-120}"
    ports:
      - "${PORT:-8000}:8000"
    expose:
      - "8000"
    networks:
      n8n-supabase-srfgnz:
        aliases:
          - parserdoc
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  n8n-supabase-srfgnz:
    external: true
